poll_interval_seconds: 60

# Recreation.gov campgrounds
# facility_id: the number in the URL — recreation.gov/camping/campgrounds/{facility_id}
recreation_gov:
  # South of SF — Big Sur
  - name: "Kirk Creek"
    facility_id: "234052"
  - name: "Plaskett Creek"
    facility_id: "233358"

# ReserveCalifornia state parks (use recreation_area_id from reservecalifornia.com)
# Find IDs with: uv run camply campgrounds --provider ReserveCalifornia --search "Park Name"
reservecalifornia:
  # North of SF
  - name: "Sonoma Coast SP"
    recreation_area_id: 718
  - name: "Salt Point SP"
    recreation_area_id: 703
  - name: "Manchester SP"
    recreation_area_id: 671
  - name: "MacKerricher SP"
    recreation_area_id: 670
  # South of SF
  - name: "Half Moon Bay SB"
    recreation_area_id: 652
  - name: "Manresa SB"
    recreation_area_id: 672
  - name: "Pfeiffer Big Sur SP"
    recreation_area_id: 690
  - name: "Andrew Molera SP"
    recreation_area_id: 1077
  - name: "Julia Pfeiffer Burns SP"
    recreation_area_id: 661

date_range:
  # start: your check-in date. end: your check-out date minus 1 day (last night of stay).
  # Example: check in Sat, check out Mon → start: Saturday, end: Sunday.
  # The number of nights is computed automatically as (end - start).days + 1.
  start: "2026-03-14"
  end: "2026-03-16"
